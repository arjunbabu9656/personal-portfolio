<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./calculator.css">
</head>
<body>
   
    <table>
        <tr>
         <td colspan="4" class="screen">
            <input type="text" id="display">
         </td>
        </tr>
        <tr>
           <td colspan="2" onclick="clearall()">CE</td>
           <td onclick="clickbtn(event)">/</td>
           <td onclick="clickbtn(event)">*</td>
        </tr>
        <tr>
            <td onclick="clickbtn(event)">7</td>
            <td onclick="clickbtn(event)">8</td>
            <td onclick="clickbtn(event)">9</td>
            <td onclick="clickbtn(event)">-</td>
        </tr>
        <tr>
            <td onclick="clickbtn(event)">4</td>
            <td onclick="clickbtn(event)">5</td>
            <td onclick="clickbtn(event)">6</td>
            <td onclick="clickbtn(event)">+</td>
        </tr>
        <tr>
            <td onclick="clickbtn(event)">1</td>
            <td onclick="clickbtn(event)">2</td>
            <td onclick="clickbtn(event)">3</td>
            <td rowspan="2"  onclick="result()">=</td>
        </tr>
        <tr>
            <td onclick="clickbtn(event)">%</td>
            <td onclick="clickbtn(event)">0</td>
            <td onclick="clickbtn(event)">.</td>
        </tr>
    </table>
    <script src="./calculator.js"></script>
</body>
</html>
